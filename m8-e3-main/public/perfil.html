<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .profile-card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        background: white;
        padding: 2rem;
      }

      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #6c63ff;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        font-weight: bold;
        margin: 0 auto 1rem;
      }

      .btn {
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container d-flex justify-content-center align-items-center">
      <div class="w-100" style="max-width: 500px; margin-top: 80px">
        <div class="profile-card text-center">
          <!-- Avatar -->
          <div class="avatar" id="avatar">U</div>

          <h2 id="name">Usuario</h2>
          <p class="text-muted" id="email">email@ejemplo.com</p>

          <hr />

          <!-- Info -->
          <div class="text-start mb-3">
            <strong>ID:</strong>
            <p id="userId">-</p>

            <strong>Fecha de registro:</strong>
            <p id="createdAt">-</p>
          </div>

          <!-- Acciones -->
          <div class="d-grid gap-2">
            <button class="btn btn-outline-danger" id="logoutBtn">
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 🔥 Simulación: aquí deberías usar tu token o fetch real
      async function cargarPerfil() {
        try {
          const res = await fetch("/perfil"); // endpoint backend
          const data = await res.json();

          if (!res.ok) {
            throw new Error("No autorizado");
          }

          document.getElementById("name").textContent = data.name;
          document.getElementById("email").textContent = data.email;
          document.getElementById("userId").textContent = data.id;
          document.getElementById("createdAt").textContent = data.createdAt;

          // inicial del avatar
          document.getElementById("avatar").textContent = data.name
            .charAt(0)
            .toUpperCase();
        } catch (error) {
          alert("Debes iniciar sesión");
          window.location.href = "/login";
        }
      }

      // 🔐 logout
      document.getElementById("logoutBtn").addEventListener("click", () => {
        // si usas token:
        // localStorage.removeItem("token");

        window.location.href = "/login.html";
      });

      cargarPerfil();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
