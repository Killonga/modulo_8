<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .container-full {
        height: 100%;
      }

      .card-custom {
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        padding: 2rem;
        background: white;
      }

      .form-control {
        border-radius: 10px;
      }

      .btn-primary {
        border-radius: 10px;
        font-weight: 500;
      }

      .link {
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center container-full"
    >
      <main class="w-100" style="max-width: 400px">
        <div class="card-custom">
          <form id="registerForm">
            <h1 class="h3 mb-4 text-center fw-semibold">Crear cuenta</h1>

            <div class="form-floating mb-3">
              <input
                type="text"
                class="form-control"
                id="name"
                placeholder="Nombre"
                required
              />
              <label for="name">Nombre</label>
            </div>

            <div class="form-floating mb-3">
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="name@example.com"
                required
              />
              <label for="email">Email</label>
            </div>

            <div class="form-floating mb-3">
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Password"
                required
              />
              <label for="password">Contraseña</label>
            </div>

            <div class="form-floating mb-3">
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                placeholder="Confirm Password"
                required
              />
              <label for="confirmPassword">Confirmar contraseña</label>
            </div>

            <button class="btn btn-primary w-100 py-2 mt-2" type="submit">
              Registrarse
            </button>

            <p class="text-center mt-3 text-muted" style="font-size: 0.9rem">
              ¿Ya tienes cuenta?

              <a href="/login" class="fw-semibold text-decoration-none">
                Inicia sesión
              </a>
            </p>
          </form>
        </div>
      </main>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          // 🔥 validación básica
          if (password !== confirmPassword) {
            alert("Las contraseñas no coinciden");
            return;
          }

          try {
            const res = await fetch("/register", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ name, email, password }),
            });

            const data = await res.json();

            if (res.ok) {
              alert("Usuario creado correctamente");
              window.location.href = "/login";
            } else {
              alert(data.message || "Error en registro");
            }
          } catch (error) {
            console.error(error);
            alert("Error de conexión");
          }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
