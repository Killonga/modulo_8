<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .login-container {
        height: 100%;
      }

      .login-card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        padding: 2rem;
        background: white;
      }

      .form-control {
        border-radius: 10px;
      }

      .btn-primary {
        border-radius: 10px;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center login-container"
    >
      <main class="w-100" style="max-width: 400px">
        <div class="login-card">
          <form id="loginForm">
            <h1 class="h3 mb-4 text-center fw-semibold">Inicia sesión</h1>

            <div class="form-floating mb-3">
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="name@example.com"
                required
              />
              <label for="email">Email</label>
            </div>

            <div class="form-floating mb-3">
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Password"
                required
              />
              <label for="password">Contraseña</label>
            </div>

            <button class="btn btn-primary w-100 py-2 mt-2" type="submit">
              Iniciar sesión
            </button>
            <p class="text-center mt-3 text-muted" style="font-size: 0.9rem">
              ¿No tienes cuenta?
              <a href="/register" class="fw-semibold text-decoration-none">
                Regístrate
              </a>
            </p>
          </form>
        </div>
      </main>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          try {
            const res = await fetch("/login", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (res.ok) {
              alert("Login exitoso");
              // window.location.href = "/dashboard";
            } else {
              alert(data.message || "Error en login");
            }
          } catch (error) {
            console.error(error);
            alert("Error de conexión");
          }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
